# models/sources/adventureworks.yml

version: 2

sources:
  - name: adventureworks
    description: Raw AdventureWorks data replicated into Snowflake by Fivetran.
    database: AWS_STACK_1_BRONZE
    schema: ADVENTUREWORKS
    loaded_at_field: _fivetran_synced

    freshness:
      warn_after:
        count: 1
        period: hour
      error_after:
        count: 2
        period: hour

    meta:
      owner: finance-analytics
      technical_owner: data-platform
      escalation_channel: "#data-platform-oncall"
      upstream_connector: fivetran/adventureworks
      incident_priority: high
      data_contract: contracts/adventureworks/orders.yml
      runbook: runbooks/fivetran_snowflake_privilege_failure.md
      incident_id: PTM-198

    tables:
      - name: orders
        description: Raw AdventureWorks order data replicated by Fivetran.
        columns:
          - name: order_id
            description: Primary key for an order.
            tests:
              - not_null
              - unique

          - name: customer_id
            description: Customer identifier associated with the order.
            tests:
              - not_null

          - name: order_status
            description: Current lifecycle status of the order.
            tests:
              - not_null
              - accepted_values:
                  values:
                    - pending
                    - processing
                    - shipped
                    - cancelled
                    - returned

          - name: order_total
            description: Total monetary value of the order.
            tests:
              - not_null

          - name: _fivetran_synced
            description: Timestamp indicating when Fivetran last synced the row.
            tests:
              - not_null

      - name: customers
        description: Raw AdventureWorks customer data replicated by Fivetran.
        columns:
          - name: customer_id
            description: Primary key for a customer.
            tests:
              - not_null
              - unique

          - name: email
            description: Customer email address.
            tests:
              - not_null

          - name: _fivetran_synced
            description: Timestamp indicating when Fivetran last synced the row.
            tests:
              - not_null
