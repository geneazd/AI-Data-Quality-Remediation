# contracts/adventureworks/orders.yml
#
# Data contract for the AdventureWorks orders source.
# This contract is used by incident response, observability, CI validation,
# and downstream ownership routing.

dataset: adventureworks.orders
environment: prod

owners:
  business_owner: finance-analytics
  technical_owner: data-platform
  escalation_channel: "#data-platform-oncall"

freshness:
  loaded_at_field: _fivetran_synced
  warn_after: 1 hour
  error_after: 2 hours
  severity: high

access_policy:
  warehouse: snowflake
  database: AWS_STACK_1_BRONZE
  schema: ADVENTUREWORKS
  connector: fivetran/adventureworks
  connector_role: FIVETRAN_ADVENTUREWORKS_ROLE
  required_privileges:
    - privilege: USAGE
      granted_on: DATABASE
      name: AWS_STACK_1_BRONZE
    - privilege: USAGE
      granted_on: SCHEMA
      name: AWS_STACK_1_BRONZE.ADVENTUREWORKS
    - privilege: CREATE TABLE
      granted_on: SCHEMA
      name: AWS_STACK_1_BRONZE.ADVENTUREWORKS
    - privilege: CREATE STAGE
      granted_on: SCHEMA
      name: AWS_STACK_1_BRONZE.ADVENTUREWORKS
    - privilege: CREATE FILE FORMAT
      granted_on: SCHEMA
      name: AWS_STACK_1_BRONZE.ADVENTUREWORKS

schema:
  fields:
    - name: order_id
      type: string
      required: true
      unique: true
      description: Primary key for an order.

    - name: customer_id
      type: string
      required: true
      description: Customer identifier associated with the order.

    - name: order_status
      type: string
      required: true
      accepted_values:
        - pending
        - processing
        - shipped
        - cancelled
        - returned
      description: Current lifecycle status of the order.

    - name: order_total
      type: numeric
      required: true
      description: Total monetary value of the order.

    - name: _fivetran_synced
      type: timestamp
      required: true
      description: Timestamp indicating when Fivetran last synced the row.

lineage:
  upstream:
    system: AdventureWorks
    connector: fivetran/adventureworks
    destination:
      warehouse: snowflake
      database: AWS_STACK_1_BRONZE
      schema: ADVENTUREWORKS

  downstream_models:
    - stg_adventureworks__orders
    - stg_adventureworks__customers
    - int_sales_order_enriched
    - fct_sales
    - dim_customer

  downstream_dashboards:
    - Executive Revenue Dashboard
    - Daily Sales Performance Dashboard
    - Customer Retention Dashboard
    - Finance Close Monitoring Dashboard

risk:
  severity: high
  business_impact: Revenue, sales, and customer reporting may be stale or incomplete.
  operational_impact: Permission regressions may cause repeated ingestion failures if not validated in CI.
